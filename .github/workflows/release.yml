name: Build Plugin ZIP

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.1)'
        required: true
        type: string

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate PHP syntax
        run: find . -name "*.php" -not -path "./.github/*" -exec php -l {} \;

      - name: Build ZIP
        run: |
          zip -r wa-form-optin-${{ steps.version.outputs.VERSION }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "tests/*" \
            -x "node_modules/*" \
            -x "*.log"

      - name: Upload ZIP to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: wa-form-optin-${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
